services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pur_leads}
      POSTGRES_USER: ${POSTGRES_USER:-pur_leads}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pur_leads_dev_password}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5433}:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-pur_leads} -d ${POSTGRES_DB:-pur_leads}",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  web:
    build: .
    command: ["web"]
    environment:
      PUR_DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-pur_leads}:${POSTGRES_PASSWORD:-pur_leads_dev_password}@postgres:5432/${POSTGRES_DB:-pur_leads}
      PUR_LOG_LEVEL: ${PUR_LOG_LEVEL:-INFO}
      PUR_WEB_HOST: 0.0.0.0
      PUR_WEB_PORT: 8000
      PUR_BOOTSTRAP_ADMIN_USERNAME: ${PUR_BOOTSTRAP_ADMIN_USERNAME:-admin}
      PUR_BOOTSTRAP_ADMIN_PASSWORD: ${PUR_BOOTSTRAP_ADMIN_PASSWORD:-}
      PUR_BOOTSTRAP_ADMIN_PASSWORD_FILE: ${PUR_BOOTSTRAP_ADMIN_PASSWORD_FILE:-/app/data/bootstrap-admin-password.txt}
      PUR_TELEGRAM_BOT_TOKEN: ${PUR_TELEGRAM_BOT_TOKEN:-}
      PUR_ZAI_API_KEY: ${PUR_ZAI_API_KEY:-}
      ZAI_API_KEY: ${ZAI_API_KEY:-}
      PUR_CATALOG_LLM_BASE_URL: ${PUR_CATALOG_LLM_BASE_URL:-https://api.z.ai/api/coding/paas/v4}
      PUR_CATALOG_LLM_MODEL: ${PUR_CATALOG_LLM_MODEL:-glm-5.1}
    ports:
      - "${PUR_WEB_PORT:-8000}:8000"
    volumes:
      - ./data:/app/data
      - ./artifacts:/app/artifacts
      - ./sessions:/app/sessions
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build: .
    command: ["worker", "run", "--poll-interval-seconds", "${WORKER_POLL_INTERVAL_SECONDS:-5}"]
    environment:
      PUR_DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-pur_leads}:${POSTGRES_PASSWORD:-pur_leads_dev_password}@postgres:5432/${POSTGRES_DB:-pur_leads}
      PUR_LOG_LEVEL: ${PUR_LOG_LEVEL:-INFO}
      PUR_WORKER_CONCURRENCY: ${PUR_WORKER_CONCURRENCY:-1}
      PUR_WEB_HOST: 0.0.0.0
      PUR_WEB_PORT: 8000
      PUR_TELEGRAM_BOT_TOKEN: ${PUR_TELEGRAM_BOT_TOKEN:-}
      PUR_ZAI_API_KEY: ${PUR_ZAI_API_KEY:-}
      ZAI_API_KEY: ${ZAI_API_KEY:-}
      PUR_CATALOG_LLM_BASE_URL: ${PUR_CATALOG_LLM_BASE_URL:-https://api.z.ai/api/coding/paas/v4}
      PUR_CATALOG_LLM_MODEL: ${PUR_CATALOG_LLM_MODEL:-glm-5.1}
      TELEGRAM_API_ID: ${TELEGRAM_API_ID:-}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH:-}
    volumes:
      - ./data:/app/data
      - ./artifacts:/app/artifacts
      - ./sessions:/app/sessions
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres-data:
