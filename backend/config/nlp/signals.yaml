signals:
  - type: need
    label: Потребность
    color: "#2e7d32"
    confidence: 0.72
    phrases:
      - ["нужно"]
      - ["нужна"]
      - ["нужен"]
      - ["ищем"]
      - ["ищем", "поставщика"]
      - ["купим"]
      - ["требуется"]
    patterns:
      - tokens:
          - normalized: "нужный"

  - type: supply
    label: Предложение
    color: "#1565c0"
    confidence: 0.68
    phrases:
      - ["продаем"]
      - ["предлагаем"]
      - ["есть", "в", "наличии"]
      - ["поставляем"]

  - type: urgency
    label: Срочность
    color: "#c62828"
    confidence: 0.64
    phrases:
      - ["срочно"]
      - ["как", "можно", "быстрее"]
      - ["до", "конца", "недели"]

  - type: commercial_terms
    label: Коммерческие условия
    color: "#6a1b9a"
    confidence: 0.6
    phrases:
      - ["с", "ндс"]
      - ["без", "ндс"]
      - ["по", "договору"]
      - ["предоплата"]

  - type: customer_intent
    label: Запрос заказчика
    color: "#ef6c00"
    confidence: 0.76
    patterns:
      - tokens:
          - normalized: "заказчик"
          - normalized: "хотеть"
      - tokens:
          - normalized: "клиент"
          - normalized: "хотеть"
      - tokens:
          - normalized: "запрос"
          - normalized: "от"
          - normalized: "клиент"

  - type: provider_search
    label: Поиск исполнителя / контактов
    color: "#ad1457"
    confidence: 0.86
    patterns:
      - tokens:
          - normalized: "посоветовать"
          - normalized: "контакт"
      - tokens:
          - normalized: "к"
          - normalized: "кто"
          - normalized: "идти"
      - tokens:
          - normalized: "где"
          - normalized: "можно"
          - normalized: "заказать"

  - type: installation_request
    label: Запрос на установку / подключение
    color: "#0277bd"
    confidence: 0.84
    patterns:
      - tokens:
          - normalized: "установить"
          - normalized: "и"
          - normalized: "подключить"
      - tokens:
          - normalized: "установить"
      - tokens:
          - normalized: "подключить"

  - type: smart_home_automation
    label: Умный дом / автоматизация
    color: "#00838f"
    confidence: 0.84
    patterns:
      - tokens:
          - normalized: "умный"
          - normalized: "дом"
      - tokens:
          - normalized: "автоматизация"
      - tokens:
          - caseless: "zigbee"
          - normalized: "шлюз"
      - tokens:
          - normalized: "алиса"
      - tokens:
          - normalized: "система"
          - normalized: "защита"
          - normalized: "от"
          - normalized: "протечка"

  - type: video_surveillance
    label: Видеонаблюдение
    color: "#455a64"
    confidence: 0.84
    patterns:
      - tokens:
          - normalized: "система"
          - normalized: "видеонаблюдение"
      - tokens:
          - normalized: "видеонаблюдение"
      - tokens:
          - normalized: "камера"

  - type: consultation_request
    label: Нужна консультация
    color: "#7b1fa2"
    confidence: 0.78
    patterns:
      - tokens:
          - normalized: "проконсультироваться"
      - tokens:
          - normalized: "нужно"
          - normalized: "проконсультироваться"

  - type: installation_context
    label: Монтажный контекст
    color: "#6d4c41"
    confidence: 0.72
    patterns:
      - tokens:
          - normalized: "камера"
          - normalized: "на"
          - normalized: "стена"
      - tokens:
          - normalized: "вывод"

  - type: hot_lead_intent
    label: Горячий лид
    color: "#d32f2f"
    confidence: 0.9
    patterns:
      - tokens:
          - normalized: "запрос"
          - normalized: "от"
          - normalized: "клиент"
      - tokens:
          - normalized: "посоветовать"
          - normalized: "контакт"
      - tokens:
          - normalized: "установить"
          - normalized: "и"
          - normalized: "подключить"

  - type: electrical_design_context
    label: Контекст электрики
    color: "#5d4037"
    confidence: 0.74
    patterns:
      - tokens:
          - normalized: "чертеж"
          - normalized: "электрика"
      - tokens:
          - normalized: "план"
          - normalized: "розетка"
      - tokens:
          - normalized: "освещение"
