signals:
  - type: lead_active_intent
    label: Активное намерение / заявка
    group: "V3: намерение"
    color: "#d32f2f"
    confidence: 0.88
    match:
      facts:
        - types:
            - intent_need
            - intent_customer_request
            - intent_provider_search
            - intent_install_connect

  - type: lead_consultation_intent
    label: Консультация / вопрос по реализации
    group: "V3: намерение"
    color: "#7b1fa2"
    confidence: 0.78
    match:
      facts:
        - types:
            - intent_consultation

  - type: lead_research_intent
    label: Подбор / изучение решения
    group: "V3: намерение"
    color: "#00897b"
    confidence: 0.78
    match:
      facts:
        - types:
            - intent_solution_selection
            - intent_implementation

  - type: project_context
    label: Проектный / монтажный контекст
    group: "V3: контекст"
    color: "#5d4037"
    confidence: 0.74
    match:
      facts:
        - types:
            - context_design_project
            - context_wiring_output
            - context_renovation_modification
            - context_developer_system
            - context_warranty_risk

  - type: segment_designer
    label: "Сегмент: дизайнер / проектировщик"
    group: "V3: сегмент"
    color: "#3949ab"
    confidence: 0.7
    match:
      facts:
        - types:
