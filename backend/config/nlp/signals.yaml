signals:
  - type: need
    label: Потребность
    color: "#2e7d32"
    confidence: 0.72
    phrases:
      - ["нужно"]
      - ["нужна"]
      - ["нужен"]
      - ["ищем"]
      - ["ищем", "поставщика"]
      - ["купим"]
      - ["требуется"]
    patterns:
      - tokens:
          - normalized: "нужный"

  - type: supply
    label: Предложение
    color: "#1565c0"
    confidence: 0.68
    phrases:
      - ["продаем"]
      - ["предлагаем"]
      - ["есть", "в", "наличии"]
      - ["поставляем"]

  - type: urgency
    label: Срочность
    color: "#c62828"
    confidence: 0.64
    phrases:
      - ["срочно"]
      - ["как", "можно", "быстрее"]
      - ["до", "конца", "недели"]

  - type: commercial_terms
    label: Коммерческие условия
    color: "#6a1b9a"
    confidence: 0.6
    phrases:
      - ["с", "ндс"]
      - ["без", "ндс"]
      - ["по", "договору"]
      - ["предоплата"]

  - type: customer_intent
    label: Запрос заказчика
    color: "#ef6c00"
    confidence: 0.76
    patterns:
      - tokens:
          - normalized: "заказчик"
          - normalized: "хотеть"
      - tokens:
          - normalized: "клиент"
          - normalized: "хотеть"

  - type: smart_home_automation
    label: Умный дом / автоматизация
    color: "#00838f"
    confidence: 0.84
    patterns:
      - tokens:
          - normalized: "умный"
          - normalized: "дом"
      - tokens:
          - normalized: "автоматизация"

  - type: electrical_design_context
    label: Контекст электрики
    color: "#5d4037"
    confidence: 0.74
    patterns:
      - tokens:
          - normalized: "чертеж"
          - normalized: "электрика"
      - tokens:
          - normalized: "план"
          - normalized: "розетка"
      - tokens:
          - normalized: "освещение"
