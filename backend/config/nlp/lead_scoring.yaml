lead_scoring:
  thresholds:
    lead: 35
    warm: 60
    hot: 90
  weights:
    signals:
      lead_active_intent: 25
      lead_partner_sourcing: 20
      lead_consultation_intent: 10
      lead_research_intent: 12
      project_context: 12
      segment_designer: 6
      segment_private_residential: 4
      segment_commercial: 6
      segment_family: 4
      pur_smart_home: 30
      pur_leak_protection: 30
      pur_video_surveillance: 25
      pur_access_control: 30
      pur_intercom: 25
      pur_security_alarm: 30
      pur_gate_automation: 25
      pur_power_stability: 25
      pur_climate_control: 25
      pur_lighting_automation: 25
      pur_curtain_control: 20
      pur_network_infrastructure: 20
      noise_supply: -50
      noise_advertising_self_promo: -50
      noise_diy_equipment_only: -50
      noise_price_only: -40
      noise_ordinary_household: -50
    facts:
      intent_customer_request: 8
      intent_provider_search: 8
      intent_partner_contractor_search: 15
      intent_install_connect: 6
      intent_consultation: 4
      intent_solution_selection: 5
      intent_implementation: 5
      context_design_project: 6
      context_wiring_output: 6
      context_renovation_modification: 6
      context_developer_system: 6
      context_warranty_risk: 6
      service_location: 3
      domain_smart_home: 5
      domain_leak_protection: 5
      domain_video_surveillance: 5
      domain_access_control: 5
      domain_security_alarm: 5
      domain_climate: 5
      domain_lighting: 5
      domain_curtain: 5
      domain_network: 5
      vendor: 2
      protocol: 2
      software: 2
      model: 2
      automation_component: 2
      controlled_device: 2
      access_device: 2
      video_device: 2
      power_equipment: 2
      network_scope: 2
  solution_areas:
    smart_home:
      label: Умный дом / автоматизация
      signal_types:
        - pur_smart_home
        - pur_lighting_automation
        - pur_curtain_control
        - pur_climate_control
        - pur_leak_protection
      fact_types: []
    security:
      label: Безопасность / видеонаблюдение
      signal_types:
        - pur_video_surveillance
        - pur_access_control
        - pur_intercom
        - pur_security_alarm
        - pur_leak_protection
      fact_types: []
    access_control:
      label: СКУД / домофония / въездные группы
      signal_types:
        - pur_access_control
        - pur_intercom
        - pur_gate_automation
      fact_types: []
    power_stability:
      label: Бесперебойное электроснабжение
      signal_types:
        - pur_power_stability
      fact_types: []
    engineering_networks:
      label: СКС / инженерные системы
      signal_types:
        - pur_network_infrastructure
      fact_types: []
    climate:
      label: Управление климатом
      signal_types:
        - pur_climate_control
      fact_types: []
  customer_segments:
    active_request:
      label: Активный запрос на подрядчика
      signal_types:
        - lead_active_intent
      fact_types:
        - intent_customer_request
        - intent_provider_search
        - intent_install_connect
    partner_contractor:
      label: Партнерство / поиск подрядчиков
      signal_types:
        - lead_partner_sourcing
      fact_types:
        - intent_partner_contractor_search
    research_project:
      label: Подбор решений / консультация
      signal_types:
        - lead_consultation_intent
        - lead_research_intent
      fact_types:
        - intent_consultation
        - intent_solution_selection
        - intent_implementation
    designer_partner:
      label: Дизайнер / проектировщик
      signal_types:
        - segment_designer
      fact_types:
        - context_designer
    private_residential:
      label: Частное жилье
      signal_types:
        - segment_private_residential
      fact_types:
        - object_apartment
        - object_country_house
    commercial_client:
      label: Коммерческий объект
      signal_types:
        - segment_commercial
      fact_types:
        - object_commercial
    family_residential:
      label: Семья в квартире / доме
      signal_types:
        - segment_family
      fact_types:
        - object_family
    renovation_project:
      label: Ремонт / изменение проекта
      signal_types:
        - project_context
      fact_types:
        - context_renovation_modification
        - context_developer_system
        - context_warranty_risk
  intent_signal_types:
    - lead_active_intent
    - lead_partner_sourcing
    - lead_consultation_intent
    - lead_research_intent
  noise_signal_types:
    - noise_supply
    - noise_advertising_self_promo
    - noise_diy_equipment_only
    - noise_price_only
    - noise_ordinary_household
  lead_veto_signal_types:
    - noise_supply
    - noise_advertising_self_promo
    - noise_diy_equipment_only
    - noise_price_only
    - noise_ordinary_household
  score_caps:
    - key: hard_noise
      label: Явный шум / нецелевой запрос
      max_score: 0
      noise_signal_types:
        - noise_supply
        - noise_advertising_self_promo
        - noise_diy_equipment_only
        - noise_price_only
        - noise_ordinary_household
    - key: domain_without_intent
      label: Домен без явного намерения
      max_score: 34
      signal_types:
        - pur_smart_home
        - pur_leak_protection
        - pur_video_surveillance
        - pur_access_control
        - pur_intercom
        - pur_security_alarm
        - pur_gate_automation
        - pur_power_stability
        - pur_climate_control
        - pur_lighting_automation
        - pur_curtain_control
        - pur_network_infrastructure
      excluded_signal_types:
        - lead_active_intent
        - lead_partner_sourcing
        - lead_consultation_intent
        - lead_research_intent
    - key: intent_without_pur_domain
      label: Намерение без целевого домена
      max_score: 34
      signal_types:
        - lead_active_intent
        - lead_consultation_intent
        - lead_research_intent
      excluded_signal_types:
        - lead_partner_sourcing
        - pur_smart_home
        - pur_leak_protection
        - pur_video_surveillance
        - pur_access_control
        - pur_intercom
        - pur_security_alarm
        - pur_gate_automation
        - pur_power_stability
        - pur_climate_control
        - pur_lighting_automation
        - pur_curtain_control
        - pur_network_infrastructure
  review_lanes:
    - key: noise
      label: Шум / нецелевое
      description: Явные продажи, DIY-запросы, цена без потребности или бытовые вопросы вне целевого домена.
      priority: 1000
      match_groups:
        - noise_signal_types:
            - noise_supply
            - noise_advertising_self_promo
            - noise_diy_equipment_only
            - noise_price_only
            - noise_ordinary_household
    - key: direct_pur_lead
      label: Прямой лид
      description: Есть целевой домен и активное намерение найти подрядчика, заказать, установить, подключить или подготовить проектные выводы.
      priority: 900
      match_groups:
        - solution_area_types:
            - smart_home
            - security
            - access_control
            - power_stability
            - engineering_networks
            - climate
        - reason_keys:
            - intent_customer_request
            - intent_provider_search
            - intent_install_connect
      excluded_noise_signal_types:
        - noise_supply
        - noise_advertising_self_promo
        - noise_diy_equipment_only
        - noise_price_only
        - noise_ordinary_household
    - key: design_studio_partner_sourcing
      label: Дизайн-студия / поиск команды
      description: Дизайн-студия ищет дизайнеров, бригады или партнеров для сотрудничества.
      priority: 860
      min_score: 35
      match_groups:
        - signal_types:
            - lead_partner_sourcing
        - fact_types:
            - context_designer
      excluded_noise_signal_types:
        - noise_supply
        - noise_advertising_self_promo
        - noise_diy_equipment_only
        - noise_price_only
        - noise_ordinary_household
    - key: partner_contractor_sourcing
      label: Партнерство / подрядчики
      description: Ищут партнеров, подрядчиков, строительные бригады или мастеров для проектного сотрудничества.
      priority: 850
      min_score: 35
      match_groups:
        - signal_types:
            - lead_partner_sourcing
      excluded_noise_signal_types:
        - noise_supply
        - noise_advertising_self_promo
        - noise_diy_equipment_only
        - noise_price_only
        - noise_ordinary_household
    - key: research_warm
      label: Исследование / подбор решения
      description: Есть целевой домен и вопрос по выбору, пользе, реализации или изучению темы.
      priority: 750
      match_groups:
        - solution_area_types:
            - smart_home
            - security
            - access_control
            - power_stability
            - engineering_networks
            - climate
        - intent_signal_types:
            - lead_consultation_intent
            - lead_research_intent
      excluded_noise_signal_types:
        - noise_supply
        - noise_advertising_self_promo
        - noise_diy_equipment_only
        - noise_price_only
        - noise_ordinary_household
    - key: pur_design_context
      label: Проектный контекст
      description: Целевой домен связан с дизайном, ремонтом, электрикой, white box, гарантией или проектной документацией.
      priority: 650
      match_groups:
        - solution_area_types:
            - smart_home
            - security
            - access_control
            - power_stability
            - engineering_networks
            - climate
        - signal_types:
            - project_context
      excluded_noise_signal_types:
        - noise_supply
        - noise_advertising_self_promo
        - noise_diy_equipment_only
        - noise_price_only
        - noise_ordinary_household
    - key: domain_interest
      label: Доменный интерес
      description: Есть релевантная область, но намерение или проектный контекст слабые.
      priority: 500
      match_groups:
        - solution_area_types:
            - smart_home
            - security
            - access_control
            - power_stability
            - engineering_networks
            - climate
      excluded_noise_signal_types:
        - noise_supply
        - noise_advertising_self_promo
        - noise_diy_equipment_only
        - noise_price_only
        - noise_ordinary_household
    - key: off_domain_demand
      label: Спрос без целевого домена
      description: Есть активный запрос или консультация, но релевантная область не проявилась.
      priority: 300
      match_groups:
        - intent_signal_types:
            - lead_active_intent
            - lead_consultation_intent
            - lead_research_intent
      excluded_solution_area_types:
        - smart_home
        - security
        - access_control
        - power_stability
        - engineering_networks
        - climate
      excluded_noise_signal_types:
        - noise_supply
        - noise_advertising_self_promo
        - noise_diy_equipment_only
        - noise_price_only
        - noise_ordinary_household
    - key: generic_context
      label: Общий контекст
      description: Есть проектный или сегментный контекст без уверенного целевого домена.
      priority: 100
      match_groups:
        - signal_types:
            - project_context
            - segment_designer
            - segment_private_residential
            - segment_commercial
            - segment_family
      excluded_solution_area_types:
        - smart_home
        - security
        - access_control
        - power_stability
        - engineering_networks
        - climate
      excluded_noise_signal_types:
        - noise_supply
        - noise_advertising_self_promo
        - noise_diy_equipment_only
        - noise_price_only
        - noise_ordinary_household
    - key: other_candidate
      label: Прочий кандидат
      description: Кандидат не попал в более конкретную очередь и требует анализа правил.
      priority: 0
      match_groups: []
