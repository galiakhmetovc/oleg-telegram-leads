facts:
  - type: volume
    label: Объем
    confidence: 0.55
    phrases:
      - ["тонн"]
      - ["паллет"]
      - ["штук"]
      - ["коробок"]

  - type: deadline
    label: Срок
    confidence: 0.55
    phrases:
      - ["сегодня"]
      - ["завтра"]
      - ["на", "следующей", "неделе"]
      - ["до", "конца", "недели"]

  - type: solution_area
    label: Решение / направление
    confidence: 0.72
