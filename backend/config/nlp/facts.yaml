          - normalized: "яндекс"
      - tokens:
          - caseless: "yandex"

  - type: design_scope
    label: Раздел проектирования
    confidence: 0.64
    patterns:
      - tokens:
          - normalized: "чертеж"
          - normalized: "электрика"
